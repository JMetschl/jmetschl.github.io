<nav class="navbar is-fixed-top is-spaced is-primary">
  <div class="navbar-brand">
    <a href="/">
      <img src="{{ '/assets/img/logo.png' | relative_url }}" class="logo" />
    </a>

    <div
      class="navbar-burger js-burger"
      data-target="navbarExampleTransparentExample"
    >
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <div class="navbar-end">
    <div id="navbarExampleTransparentExample" class="navbar-menu">
      <div class="navbar-start">
        {% for item in site.data.navigation %} {% if item.dropdown %}
        <div div class="navbar-item has-dropdown is-hoverable">
          <a href="{{ item.link }}" class="navbar-link"> {{ item.name }} </a>
          {% assign dropdown = item.dropdown %}

          <div class="navbar-dropdown">
            {% for dropdown_item in dropdown%}
            <a
              href="{{ dropdown_item.link | relative_url}}"
              class="navbar-item"
            >
              {{ dropdown_item.name }}
            </a>
            {% endfor %}
          </div>
        </div>
        {% else %}
        <a href="{{ item.link }}" class="navbar-item"> {{ item.name }} </a>
        {% endif %} {% endfor %}
      </div>
     
  </div>
</nav>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const $navbarBurgers = Array.prototype.slice.call(
      document.querySelectorAll(".navbar-burger"),
      0
    );
    $navbarBurgers.forEach((el) => {
      el.addEventListener("click", () => {
        const target = el.dataset.target;
        const $target = document.getElementById(target);
        el.classList.toggle("is-active");
        $target.classList.toggle("is-active");
      });
    });
  });
</script>

<style>
  .navbar {
    --bulma-navbar-height: 3.5em;
  }
  .logo {
    max-height: var(--bulma-navbar-height);
  }
  .social-media-container {
    display: flex !important;
    justify-content: center;
  }
</style>
